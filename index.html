<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#000000">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>HMAYED &middot; Cinema</title>
  <link rel="icon" type="image/png" href="favicon.png">

  <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin>
  <link rel="preconnect" href="https://api.fontshare.com" crossorigin>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

  <!-- refined fonts: Clash Display (variable) + Inter (soft) -->
  <link href="https://api.fontshare.com/v2/css?f[]=clash-display@400,500,600,700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300..600;1,300&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="main.css">
</head>

<body>

  <!-- ambient environment layers -->
  <div class="env-ambient" aria-hidden="true"></div>
  <div class="env-vignette" aria-hidden="true"></div>

  <!-- BLACK RIBBON - centered logo -->
  <header class="top-bar top-bar-home">
    <a href="/" class="logo">HMAYED</a>
  </header>

  <!-- MAIN CONTENT -->
  <main class="main">

    <!-- VIDEO WRAPPER with artistic curved lines -->
    <div class="video-wrapper">

      <!-- ARTISTIC CURVED WHITE LINES -->
      <div class="art-lines">
        <div class="art-line curve-1"></div>
        <div class="art-line curve-2"></div>
        <div class="art-line curve-3"></div>
        <div class="art-line curve-4"></div>
        <div class="art-line curve-5"></div>
      </div>



      <!-- VIDEO BLOCK - mobile-optimized -->
      <div class="video-block">
        <video class="hero-video" playsinline muted autoplay loop preload="metadata">
          <source src="main.mp4" type="video/mp4">
          Your browser does not support the video tag.
        </video>

        <!-- UNMUTE BUTTON - mobile-friendly -->
        <button class="unmute-btn" id="unmuteBtn">
          <i class="fas fa-volume-mute"></i>
          <span>Sound</span>
        </button>

        <!-- REPLAY BUTTON - centered -->
        <button class="replay-btn" id="replayBtn">
          <i class="fas fa-arrow-rotate-right"></i>
        </button>
      </div>
    </div>

    <div class="section-divider" aria-hidden="true">
      <span>Explore</span>
    </div>
    <!-- LINKTREE-STYLE BUTTONS -->
    <div class="links-section">
      <!-- CINEMATIC 3D BACKGROUND -->
      <div class="wild-3d-bg cinematic">
        <!-- Minimalist Cinematic Stage Spotlights -->
        <div class="spotlight spot-left"></div>
        <div class="spotlight spot-right"></div>
        <div class="spotlight spot-center"></div>
      </div>

      <div id="refractiveControlsRoot"></div>

      <div class="footnote">- CINEMA -</div>
    </div>

    <div class="powered-by">Powered by Quantex AI Solutions</div>
  </main>

  <script defer crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script defer crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script defer src="refractive-controls.react.js"></script>
  <script src="main.js" defer></script>
</body>

</html>
